{% extends 'base.html' %}
{% from 'macros.html' import book_form_fields %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h1 class="my-4 text-center">{{ title }}</h1>
        
        <div class="card">
            <div class="card-body">
                {% if is_edit %}
                    <form method="POST" enctype="multipart/form-data" action="{{ url_for('books.edit', book_id=form_data.id) }}" id="bookForm">
                {% else %}
                    <form method="POST" enctype="multipart/form-data" action="{{ url_for('books.create') }}" id="bookForm">
                {% endif %}
                    
                    {{ book_form_fields(genres, form_data, errors, is_edit) }}
                    
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <a href="{{ url_for('books.index') }}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
